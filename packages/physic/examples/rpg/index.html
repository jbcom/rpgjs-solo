<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Physic - RPG Example</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }
    h1 {
      margin: 0 0 10px 0;
      color: #4ecdc4;
    }
    #canvas {
      border: 3px solid #333;
      background: #2d5016;
      cursor: none;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    .controls {
      margin-top: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }
    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
      text-align: center;
    }
    .instructions {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      max-width: 800px;
    }
    .instructions h2 {
      margin-top: 0;
      color: #4ecdc4;
      font-size: 18px;
    }
    .instructions ul {
      margin: 10px 0;
      padding-left: 20px;
    }
    .instructions li {
      margin: 5px 0;
    }
    .key {
      background: #444;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🗡️ RPG Physic - Jeu RPG</h1>
  <canvas id="canvas" width="1024" height="768"></canvas>
  <div class="info" id="info">Position: (0, 0) | NPCs: 5 | FPS: 60</div>
  
  <div class="instructions">
    <h2>Contrôles</h2>
    <ul>
      <li>Déplacement : <span class="key">WASD</span> ou <span class="key">Flèches</span></li>
      <li>Le héros (bleu) se déplace et peut pousser les NPCs (vert)</li>
      <li>Les murs et obstacles (gris) sont statiques</li>
      <li>Les arbres (marron) sont décoratifs</li>
    </ul>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
