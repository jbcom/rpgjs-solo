<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Physic - Canvas Example</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin: 0 0 10px 0;
    }
    #canvas {
      border: 2px solid #333;
      background: #0a0a0a;
    }
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      background: #4a4a4a;
      color: #fff;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #5a5a5a;
    }
    .info {
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>RPG Physic - Canvas Example</h1>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div class="controls">
    <button id="clearBtn">Clear</button>
    <button id="addBallsBtn">Add 10 Balls</button>
    <button id="explosionBtn">Explosion</button>
    <span class="info" id="info">Click to add balls. Entities: 0</span>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
