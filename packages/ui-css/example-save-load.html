<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG UI - Save/Load</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/index.css">
    <link rel="stylesheet" href="./theme-default/theme.css">
    <style>
        body {
            background-color: #111;
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('https://images.unsplash.com/photo-1542256844-3b9a5c291693?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .save-container {
            width: 800px;
            max-width: 95%;
        }

        .save-slots {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-top: 24px;
        }

        .save-slot {
            background: var(--rpg-ui-surface);
            border: 4px solid var(--rpg-ui-border);
            border-radius: var(--rpg-ui-radius-lg);
            padding: 16px;
            display: flex;
            gap: 24px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            height: 140px;
        }

        .save-slot:hover {
            border-color: var(--rpg-ui-accent);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .save-slot-image {
            width: 180px;
            height: 100%;
            background: #000;
            border: 2px solid var(--rpg-ui-border-dark);
            border-radius: var(--rpg-ui-radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .save-slot-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .save-slot-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .save-slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--rpg-ui-border-dark);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .save-slot-id {
            font-weight: bold;
            color: var(--rpg-ui-accent);
            font-size: var(--rpg-ui-font-size-lg);
        }

        .save-slot-date {
            color: var(--rpg-ui-text-muted);
            font-size: var(--rpg-ui-font-size-sm);
        }

        .save-slot-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            color: var(--rpg-ui-text);
            font-size: var(--rpg-ui-font-size);
        }

        .save-slot-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            color: var(--rpg-ui-text-muted);
            font-style: italic;
            font-size: var(--rpg-ui-font-size-lg);
        }

        .save-slot-actions {
            position: absolute;
            right: 16px;
            bottom: 16px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .save-slot:hover .save-slot-actions {
            opacity: 1;
        }

        .back-btn {
            position: absolute;
            top: 24px;
            left: 24px;
        }
    </style>
</head>

<body>

    <button class="rpg-ui-btn back-btn">← Back</button>

    <div class="rpg-ui-window save-container rpg-anim-fade-in">
        <div class="rpg-ui-window-title">Load Game</div>

        <div class="save-slots">
            <!-- Slot 1 -->
            <div class="save-slot">
                <div class="save-slot-image">
                    <div style="font-size: 40px;">🏰</div>
                </div>
                <div class="save-slot-info">
                    <div class="save-slot-header">
                        <span class="save-slot-id">Slot 1</span>
                        <span class="save-slot-date">2023-10-25 14:30</span>
                    </div>
                    <div class="save-slot-details">
                        <div>Location: <strong>Crystal Caves</strong></div>
                        <div>Level: <strong>42</strong></div>
                        <div>Playtime: <strong>12:45:30</strong></div>
                        <div>Gold: <strong>5,430</strong></div>
                    </div>
                </div>
                <div class="save-slot-actions">
                    <button class="rpg-ui-btn" data-variant="primary">Load</button>
                    <button class="rpg-ui-btn" data-variant="danger">Delete</button>
                </div>
            </div>

            <!-- Slot 2 -->
            <div class="save-slot">
                <div class="save-slot-image">
                    <div style="font-size: 40px;">🌲</div>
                </div>
                <div class="save-slot-info">
                    <div class="save-slot-header">
                        <span class="save-slot-id">Slot 2</span>
                        <span class="save-slot-date">2023-10-24 09:15</span>
                    </div>
                    <div class="save-slot-details">
                        <div>Location: <strong>Elven Forest</strong></div>
                        <div>Level: <strong>28</strong></div>
                        <div>Playtime: <strong>08:20:15</strong></div>
                        <div>Gold: <strong>2,100</strong></div>
                    </div>
                </div>
                <div class="save-slot-actions">
                    <button class="rpg-ui-btn" data-variant="primary">Load</button>
                    <button class="rpg-ui-btn" data-variant="danger">Delete</button>
                </div>
            </div>

            <!-- Slot 3 (Empty) -->
            <div class="save-slot" style="opacity: 0.7;">
                <div class="save-slot-empty">
                    -- Empty Slot --
                </div>
                <div class="save-slot-actions">
                    <button class="rpg-ui-btn" data-variant="success">New Game</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
