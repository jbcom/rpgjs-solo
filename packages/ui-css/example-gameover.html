<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG UI - Game Over</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./theme-default.css">
    <style>
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-over-text {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            color: #880000;
            text-transform: uppercase;
            text-shadow:
                0 0 20px rgba(255, 0, 0, 0.5),
                4px 4px 0px #330000;
            margin-bottom: 40px;
            letter-spacing: 10px;
            animation: rpg-shake 0.5s ease-in-out;
        }

        .options {
            display: flex;
            gap: 20px;
            opacity: 0;
            animation: rpg-fade-in 1s ease-out 1s forwards;
        }

        .game-over-btn {
            background: transparent;
            border: 2px solid #880000;
            color: #ff4444;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            padding: 12px 32px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .game-over-btn:hover {
            background: #880000;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            transform: scale(1.1);
        }

        /* Blood splatter effect (CSS only) */
        .splatter {
            position: absolute;
            background: radial-gradient(circle, #660000 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.6;
            z-index: -1;
        }
    </style>
</head>

<body>

    <!-- Decorative splatters -->
    <div class="splatter" style="top: 20%; left: 30%; width: 300px; height: 300px;"></div>
    <div class="splatter" style="bottom: 10%; right: 20%; width: 400px; height: 400px;"></div>
    <div class="splatter"
        style="top: 50%; left: 50%; width: 600px; height: 600px; transform: translate(-50%, -50%); opacity: 0.3;"></div>

    <h1 class="game-over-text">Game Over</h1>

    <div class="options">
        <button class="game-over-btn">Try Again</button>
        <button class="game-over-btn">Load Game</button>
        <button class="game-over-btn">Quit</button>
    </div>

</body>

</html>
