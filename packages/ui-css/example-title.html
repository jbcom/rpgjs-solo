<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG UI - Title Screen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/index.css">
    <link rel="stylesheet" href="./theme-default/theme.css">
    <style>
        body {
            background-color: #000;
            background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Dark overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 0;
        }

        .title-container {
            z-index: 1;
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            color: #ffd700;
            text-transform: uppercase;
            text-shadow:
                0 0 10px rgba(255, 215, 0, 0.5),
                4px 4px 0px #8b6d36,
                8px 8px 0px #000;
            margin: 0;
            line-height: 1;
            letter-spacing: 10px;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-top: 10px;
            text-shadow: 2px 2px 4px #000;
            opacity: 0.8;
        }

        .menu-container {
            z-index: 1;
            width: 300px;
        }

        .press-start {
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            animation: blink 1.5s infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* Custom menu styling for title screen */
        .title-menu .rpg-ui-menu-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 10px;
            padding: 12px;
        }

        .title-menu .rpg-ui-menu-item:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
            padding-left: 12px;
            /* Override default shift */
            transform: scale(1.05);
        }

        .title-menu .rpg-ui-menu-item:hover::before {
            display: none;
            /* Hide default arrow */
        }

        .version {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-family: monospace;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="title-container rpg-anim-float">
        <h1>Chronicles</h1>
        <div class="subtitle">of the Ancients</div>
    </div>

    <div class="menu-container rpg-anim-slide-up">
        <div class="press-start">PRESS START</div>

        <div class="rpg-ui-menu title-menu" style="background: transparent; border: none; box-shadow: none;">
            <div class="rpg-ui-menu-item">New Game</div>
            <div class="rpg-ui-menu-item">Load Game</div>
            <div class="rpg-ui-menu-item">Options</div>
            <div class="rpg-ui-menu-item">Credits</div>
        </div>
    </div>

    <div class="version">v1.0.0</div>

</body>

</html>
