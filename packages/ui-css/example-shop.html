<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG UI - Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/index.css">
    <link rel="stylesheet" href="./theme-default/theme.css">
    <style>
        body {
            background-color: #111;
            background-image: url('https://images.unsplash.com/photo-1578662996442-48f60103fc96?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .shop-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            width: 1000px;
            max-width: 100%;
            height: 600px;
        }

        .merchant-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .merchant-portrait {
            height: 300px;
            background: var(--rpg-ui-surface);
            border: 4px solid var(--rpg-ui-border);
            border-radius: var(--rpg-ui-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: var(--rpg-ui-shadow);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            overflow-y: auto;
            padding-right: 8px;
            max-height: 400px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--rpg-ui-border-dark);
            padding: 12px;
            border-radius: var(--rpg-ui-radius-md);
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .shop-item:hover {
            background: var(--rpg-ui-surface-light);
            border-color: var(--rpg-ui-border-light);
        }

        .shop-item[data-selected="true"] {
            border-color: var(--rpg-ui-accent);
            background: var(--rpg-ui-surface-light);
            box-shadow: inset 0 0 10px rgba(255, 204, 0, 0.2);
        }

        .shop-item-icon {
            width: 48px;
            height: 48px;
            background: #000;
            border: 1px solid var(--rpg-ui-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .shop-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .shop-item-name {
            font-weight: bold;
            color: var(--rpg-ui-text);
        }

        .shop-item-price {
            color: var(--rpg-ui-accent);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .gold-icon {
            color: #ffd700;
        }

        .transaction-panel {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--rpg-ui-border-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-gold {
            font-size: var(--rpg-ui-font-size-lg);
            color: #ffd700;
            text-shadow: 1px 1px 0 #000;
        }
    </style>
</head>

<body>

    <div class="shop-layout">
        <!-- Left: Merchant -->
        <div class="merchant-panel">
            <div class="merchant-portrait">
                🧙‍♂️
            </div>
            <div class="rpg-ui-dialog" style="min-height: auto; margin-top: 0;">
                <div class="rpg-ui-dialog-speaker">Merchant</div>
                <div class="rpg-ui-dialog-content" style="font-size: 16px;">
                    "Got some rare things on sale, stranger!"
                </div>
            </div>
            <div class="rpg-ui-panel">
                <div class="player-gold">💰 5,430 G</div>
            </div>
        </div>

        <!-- Right: Items -->
        <div class="rpg-ui-window">
            <div class="rpg-ui-window-title">Blacksmith's Wares</div>

            <div class="items-grid">
                <!-- Item 1 -->
                <div class="shop-item" data-selected="true">
                    <div class="shop-item-icon">⚔️</div>
                    <div class="shop-item-details">
                        <div class="shop-item-name">Iron Sword</div>
                        <div class="shop-item-price">500 <span class="gold-icon">G</span></div>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="shop-item">
                    <div class="shop-item-icon">🛡️</div>
                    <div class="shop-item-details">
                        <div class="shop-item-name">Wooden Shield</div>
                        <div class="shop-item-price">300 <span class="gold-icon">G</span></div>
                    </div>
                </div>

                <!-- Item 3 -->
                <div class="shop-item">
                    <div class="shop-item-icon">🧪</div>
                    <div class="shop-item-details">
                        <div class="shop-item-name">Health Potion</div>
                        <div class="shop-item-price">50 <span class="gold-icon">G</span></div>
                    </div>
                </div>

                <!-- Item 4 -->
                <div class="shop-item">
                    <div class="shop-item-icon">👢</div>
                    <div class="shop-item-details">
                        <div class="shop-item-name">Leather Boots</div>
                        <div class="shop-item-price">150 <span class="gold-icon">G</span></div>
                    </div>
                </div>
                <!-- Item 5 -->
                <div class="shop-item" style="opacity: 0.5;">
                    <div class="shop-item-icon">💎</div>
                    <div class="shop-item-details">
                        <div class="shop-item-name">Magic Gem</div>
                        <div class="shop-item-price" style="color: var(--rpg-ui-danger);">10,000 <span
                                class="gold-icon">G</span></div>
                    </div>
                </div>
            </div>

            <div class="transaction-panel">
                <div style="flex: 1;">
                    <h3 style="color: var(--rpg-ui-accent); margin-bottom: 4px;">Iron Sword</h3>
                    <p style="color: var(--rpg-ui-text-muted); font-size: 14px;">A standard sword for beginners.</p>
                </div>
                <button class="rpg-ui-btn" data-variant="primary" style="min-width: 100px;">Buy</button>
            </div>
        </div>
    </div>

</body>

</html>
