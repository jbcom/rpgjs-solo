<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@rpgjs/ui-css Example</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./theme-default.css">
    <style>
        body {
            background: var(--rpg-ui-bg);
            color: var(--rpg-ui-text);
            font-family: var(--rpg-ui-font);
            padding: 2rem;
        }
        .example-section {
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <h1>@rpgjs/ui-css Example</h1>

    <div class="example-section">
        <h2>Panel</h2>
        <div class="rpg-ui-panel">
            <p>This is a basic panel with the default RPG theme.</p>
        </div>
    </div>

    <div class="example-section">
        <h2>Buttons</h2>
        <button class="rpg-ui-btn">Default Button</button>
        <button class="rpg-ui-btn" data-variant="primary">Primary Button</button>
    </div>

    <div class="example-section">
        <h2>Dialog</h2>
        <div class="rpg-ui-dialog">
            <h3>Confirm Action</h3>
            <p>Are you sure you want to proceed?</p>
            <button class="rpg-ui-btn">Cancel</button>
            <button class="rpg-ui-btn" data-variant="primary">Confirm</button>
        </div>
    </div>

    <div class="example-section">
        <h2>Progress Bar</h2>
        <div class="rpg-ui-bar">
            <div class="rpg-ui-bar-fill" style="width: 75%;"></div>
        </div>
    </div>

    <div class="example-section">
        <h2>Menu</h2>
        <div class="rpg-ui-menu">
            <div class="rpg-ui-menu-item">New Game</div>
            <div class="rpg-ui-menu-item">Load Game</div>
            <div class="rpg-ui-menu-item">Settings</div>
            <div class="rpg-ui-menu-item">Quit</div>
        </div>
    </div>

    <div class="example-section">
        <h2>Custom Theme Example</h2>
        <div class="custom-theme" style="--rpg-ui-accent: hotpink; --rpg-ui-border: purple;">
            <button class="rpg-ui-btn" data-variant="primary">Custom Themed Button</button>
        </div>
    </div>
</body>
</html>
