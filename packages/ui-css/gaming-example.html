<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RPG UI - Mobile Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/index.css">
    <link id="theme-link" rel="stylesheet" href="./src/themes/rpg.css">
</head>

<body>

    <!-- Top Left HUD -->
    <div class="rpg-hud">
        <div class="rpg-avatar">
            🧙‍♂️
            <div class="rpg-avatar-level">42</div>
        </div>
        <div class="rpg-status-bars">
            <div class="rpg-bar-container">
                <span class="rpg-bar-text">HP 2450/3200</span>
                <div class="rpg-bar-fill health" style="width: 75%;"></div>
            </div>
            <div class="rpg-bar-container">
                <span class="rpg-bar-text">SP 1200/2000</span>
                <div class="rpg-bar-fill mana" style="width: 60%;"></div>
            </div>
        </div>
    </div>

    <!-- Top Right Minimap -->
    <div class="rpg-minimap">
        <!-- Placeholder map content -->
        <div
            style="width: 100%; height: 100%; background: radial-gradient(circle, #4caf50 20%, #2e7d32 80%); opacity: 0.5;">
        </div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff;">�</div>
    </div>

    <!-- Center Dialog (Contextual) -->
    <div class="rpg-ui-dialog rpg-anim-fade-in">
        <div class="rpg-ui-dialog-speaker">Elven Guide</div>
        <div class="rpg-ui-dialog-content">
            "The path ahead is dangerous. Equip your best gear before proceeding!"
        </div>
    </div>

    <!-- Bottom Item Dock -->
    <div class="rpg-item-dock glass-panel rpg-anim-slide-up">
        <div class="rpg-item-slot active">
            🗡️
        </div>
        <div class="rpg-item-slot">
            �️
        </div>
        <div class="rpg-item-slot">
            🧪
            <span class="rpg-item-qty">5</span>
        </div>
        <div class="rpg-item-slot">
            📜
            <span class="rpg-item-qty">2</span>
        </div>
        <div class="rpg-item-slot">
            🎒
        </div>
    </div>

    <!-- Action Button -->
    <div class="rpg-fab rpg-anim-scale-in">
        ⚔️
    </div>

</body>

</html>
